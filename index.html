<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Tokamak Reactor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    
    <div id="ui-panel">
        <h1>Tokamak Fusion Core</h1>
        <div class="metric">FPS: <span id="fpsOut">0</span></div>
        <div class="metric">Estimated Output: <span id="energyOut">0</span> MW</div>
        
        <div class="control-group">
            <label>Magnetic Field Strength: <span id="bFieldVal">10.0</span> T</label>
            <input type="range" id="bField" min="1" max="30" step="0.1" value="10.0">
        </div>
        <div class="control-group">
            <label>Plasma Temp (Velocity): <span id="tempVal">30.0</span> keV</label>
            <input type="range" id="temp" min="1" max="100" step="1" value="30.0">
        </div>
        <div class="control-group">
            <label>Active Particles: <span id="particleVal">500,000</span></label>
            <input type="range" id="particles" min="10000" max="1000000" step="10000" value="500000">
        </div>
        <div class="instructions">
            Left Click + Drag: Rotate Camera<br>
            Scroll: Zoom
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
